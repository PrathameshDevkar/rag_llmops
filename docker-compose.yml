version: "3.9"

services:
  
  db:
    image: pgvector/pgvector:pg16
    container_name: rag_db
    environment:
      POSTGRES_USER: langgraph_user_2
      POSTGRES_PASSWORD: langchain123
      POSTGRES_DB: llmops_rag_2
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langgraph_user_2"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  
  backend:
    build: ./backend
    container_name: rag_backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: rag_frontend
    ports:
     - "8501:8501"
    depends_on:
      - backend
    environment:
      - API_BASE=http://backend:8000
    restart: unless-stopped
  
volumes:
  pgdata:
  
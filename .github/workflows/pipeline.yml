name: Production RAG Pipeline

on:
  push:
    branches:
      - test-eval-docker
  pull_request:
    branches:
      - main
  workflow_dispatch: #Allows manual pipeline triggering from the actions UI if needed

jobs:
  #======================
  #Stage 1: CORE TESTING and COVERAGE GATE
  #======================

  test:
    runs-on: ubuntu-latest

    env:
      DB_HOST: ${{secrets.TEST_DB_HOST}}
      DB_PORT: ${{secrets.TEST_DB_PORT}}
      DB_NAME: ${{secrets.TEST_DB_NAME}}
      DB_USER: ${{secrets.TEST_DB_USER}}
      DB_PASSWORD: ${{secrets.TEST_DB_PASSWORD}}
      HUGGINGFACE_API_KEY: ${{secrets.TEST_HUGGINGFACE_API_KEY}}
      GEMINI_API_KEY: ${{secrets.TEST_GEMINI_API_KEY}}
      SECRET_KEY: ${{secrets.TEST_SECRET_KEY}}
      ALGORITHM: ${{secrets.TEST_ALGORITHM}}
      LANGSMITH_API_KEY: ${{secrets.TEST_LANGSMITH_API_KEY}}
      LANGSMITH_ENDPOINT: ${{secrets.TEST_LANGSMITH_ENDPOINT}}

    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ${{secrets.TEST_DB_USER}}
          POSTGRES_PASSWORD: ${{secrets.TEST_DB_PASSWORD }}       
          POSTGRES_DB: ${{ secrets.TEST_DB_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d langgraph_rag_test"
          --health-interval 30s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with: 
        path: ~/.cache/pip
        key: ${{runner.os}}-pip-${{hashFiles('backend/requirements.txt')}}
        restore-keys: |
          ${{runner.os}}-pip-
    
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        #double check which file is actually getting used here
        if [ -f backend/requirements.txt ]; then 
          echo "Installing from backend/requirements.txt"
          pip install -r backend/requirements.txt
        else
          echo "Installing from root requirements.txt"
          pip install -r requirements.txt
        fi

    - name: Run Complete Test Suite with Coverage Tracking
      run: |
        #we use --rcfile=.coveragerc to bind configuration riles
        #and pass "-v -s" to pytest to enable verbosity and show all print statements
        python -m coverage run --rcfile=.coveragerc -m pytest -v -schema
        python -m coverage report -m --ignore-errors

  #====================
  #Stage 2- evaluation phase
  #====================
  evaluate:
    needs: test #strictly blocks execution if test stage fails
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ${{secrets.DB_USER}}
          POSTGRES_PASSWORD: ${{secrets.DB_PASSWORD}}
          POSTGRES_DB: ${{secrets.DB_NAME}}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U langgraph_user_2 -d llmops_rag_2"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      #PYTHONPATH: ${{ github.workspace }}: This replaces the ambiguous dot (.) with an explicit, rock-solid absolute path string (e.g., /home/runner/work/rag_llmops/rag_llmops) 
      #so Python knows exactly where the root directory sits.
      PYTHONPATH: ${{github.workspace}}
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: ${{secrets.DB_NAME}}
      DB_USER: ${{secrets.DB_USER}}
      DB_PASSWORD: ${{secrets.DB_PASSWORD}}
      LANGCHAIN_TRACING_V2: "true"
      LANGCHAIN_API_KEY: ${{secrets.LANGSMITH_API_KEY}}
      LANGSMITH_PROJECT: ${{secrets.LANGSMITH_PROJECT}}
      LANGSMITH_API_KEY: ${{secrets.LANGSMITH_API_KEY}}
      LANGSMITH_ENDPOINT: ${{secrets.LANGSMITH_ENDPOINT}}
      HUGGINGFACE_API_KEY: ${{secrets.HUGGINGFACE_API_KEY}}
      GOOGLE_APPLICATION_CREDENTIALS: ${{github.workspace}}/gcp-credentials.json
      DATABASE_URL: postgresql+psycopg://${{secrets.DB_USER}}:${{secrets.DB_PASSWORD}}@localhost:5432/${{secrets.DB_NAME}}
      psycopg_URL: postgresql://${{secrets.DB_USER}}:${{secrets.DB_PASSWORD}}@localhost:5432/${{secrets.DB_NAME}}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with: 
          path: ~/.cache/pip
          key: ${{runner.os}}-pip-${{hashFiles('backend/requirements.txt')}}
          restore-keys: |
            ${{runner.os}}-pip-

      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then 
            echo "Installing from backend/requirements.txt"
            pip install -r backend/requirements.txt
          fi
          if [ -f frontend/requirements.txt ]; then  
            echo "Installing from frontend/requirements.txt"
            pip install -r frontend/requirements.txt
          else 
            pip install -r requirements.txt
          fi

      - name: Create GCP Credentials File
        run: |
          echo '${{secrets.GCP_SA_KEY}}' > ${{github.workspace}}/gcp-credentials.json

      - name: Initialize and seed Evaluation Database
        run: |
          python -m backend.evaluation.init_eval_db
      
      - name: Run RAGAS evaluation
        run: |
          python -m backend.evaluation.evaluators.ragas_eval

      - name: Run Deepeval evaluation
        run: |
          python -m backend.evaluation.evaluators.deepeval_eval

      - name: Run custom metric evaluation
        run: |
          python -m backend.evaluation.evaluators.custom_eval

      - name: Upload Evaluation Reports as Artifacts
        uses: actions/upload-artifact@v4
        with: 
          name: evaluation-reports
          path: backend/evaluation/reports/

  #==========================
  # Phase 3: Docker completion and delivery
  #==========================

  docker:
    needs: evaluate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to the docker
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}

      - name: Build Backend Image
        run: |
          docker build -t prathameshdevkarch/rag-backend:latest ./backend
      
      - name: Build Frontend Image
        run: |
          docker build -t prathameshdevkarch/rag-frontend:latest ./frontend
      
      - name: Push Backend Image
        run: |
          docker push prathameshdevkarch/rag-backend:latest
      
      - name: Push Frontend Image
        run: |
          docker push prathameshdevkarch/rag-frontend:latest

    
        
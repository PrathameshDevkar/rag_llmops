name: CI

on:
  push:
    branches:
      # - main
      - test-ci
      - test-eval-docker

  pull_request:
    branches:
      - main


jobs:
  test:

    runs-on: ubuntu-latest  

    env:
      DB_HOST: ${{secrets.TEST_DB_HOST}}
      DB_PORT: ${{secrets.TEST_DB_PORT}}
      DB_NAME: ${{secrets.TEST_DB_NAME}}
      DB_USER: ${{secrets.TEST_DB_USER}}
      DB_PASSWORD: ${{secrets.TEST_DB_PASSWORD}}
      HUGGINGFACE_API_KEY: ${{secrets.TEST_HUGGINGFACE_API_KEY}}
      GEMINI_API_KEY: ${{secrets.TEST_GEMINI_API_KEY}}
      SECRET_KEY: ${{secrets.TEST_SECRET_KEY}}
      ALGORITHM: ${{secrets.TEST_ALGORITHM}}
      LANGSMITH_API_KEY: ${{secrets.TEST_LANGSMITH_API_KEY}}
      LANGSMITH_ENDPOINT: ${{secrets.TEST_LANGSMITH_ENDPOINT}}

    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ${{secrets.TEST_DB_USER}}       # Must match pytest test DB_USER because in thei file the pytest will be executing and it will need the testing database instead credenetials of production database
          POSTGRES_PASSWORD: ${{secrets.TEST_DB_PASSWORD}} # Must match pytest test DB_PASSWORD
          POSTGRES_DB: ${{secrets.TEST_DB_NAME}}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres123"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Double check which file is actually being used here
          if [ -f backend/requirements.txt ]; then 
            echo "Installing from backend/requirements.txt"
            pip install -r backend/requirements.txt
          else 
            echo "Installing from root requirements.txt"
            pip install -r requirements.txt
          fi

      - name: Run complete Test Suite with Coverage Tracking
        run: |
          # We use --rcfile=.coveragerc to bind configuration rules,
          # and pass "-v -s" to pytest to enable verbosity and show all print statements in CI
          python -m coverage run --rcfile=.coveragerc -m pytest -v -s
          python -m coverage report -m --ignore-errors
      # - name: Run Unit Tests
      #   run: |
      #     python -m pytest backend/tests/unit -v
      
      # - name: Run API Tests
      #   run: |
      #     python -m pytest backend/tests/api -v

      # - name: Run Integration Tests
      #   run: |
      #     python -m pytest backend/tests/integration -v 
    
